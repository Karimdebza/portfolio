<section class="about" id="about">

  <div class="text">
    <p class="section-title">{{ 'about.subtitle' | translate }}</p>
    <h2>{{ 'about.title' | translate }}</h2>
    <p>{{ 'about.p1' | translate }}</p>
    <p>{{ 'about.p2' | translate }}</p>

    <div class="stats">
      <div class="stat">
        <div class="number">2+</div>
        <div class="label">{{ 'about.stat_exp' | translate }}</div>
      </div>
      <div class="stat">
        <div class="number">4+</div>
        <div class="label">{{ 'about.stat_projects' | translate }}</div>
      </div>
      <div class="stat">
        <div class="number">5+</div>
        <div class="label">{{ 'about.stat_techs' | translate }}</div>
      </div>
      <div class="stat">
        <div class="number">100%</div>
        <div class="label">{{ 'about.stat_passion' | translate }}</div>
      </div>
    </div>
  </div>

  <div class="avatar">
    <img src="karim.jpg" alt="Karim Debza — Développeur full-stack" />
  </div>

</section>
