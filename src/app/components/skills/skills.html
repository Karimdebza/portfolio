<section class="skills" id="skills">
  <p class="section-title">// ce que je maîtrise</p>
  <h2>Ma Stack Technique</h2>

  <div class="skill-groups">
    <div class="skill-group" *ngFor="let group of skillGroups">
      <h3 class="group-label">{{ group.category }}</h3>
      <div class="grid">
        <div class="skill-card" *ngFor="let skill of group.skills">
          <i [class]="skill.icon + ' colored'"></i>
          <div class="name">{{ skill.name }}</div>
        </div>
      </div>
    </div>
  </div>
</section>
